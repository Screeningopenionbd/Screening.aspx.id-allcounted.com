<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .loader {
      border: 12px solid rgba(255,255,255,0.2);
      border-top: 12px solid #00c6ff;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 1.5s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h1></h1>
  <p></p>

  <script>
    // List of surveys
    const surveys = [
      "https://www.allcounted.com/s?did=goom761fyu549&lang=en_US",
      "https://www.allcounted.com/s?did=s14bpolfyhmuz&page=2",
      "https://www.allcounted.com/s?did=kxn5hpi044bxn&lang=en_US",
      "https://www.allcounted.com/s?did=cflmvolf4058d&lang=en_US",
      "https://www.insightexpress.com/ix/Q/384683?p=129&preview=true&livePreview=True&startingPosition=0&accessCode=2295695960",
      "https://www.allcounted.com/s?did=cflb4olfvfm8d&lang=en_US",
      "https://www.allcounted.com/s?did=3oa5x96p4nboa&lang=en_US"
      "https://www.insightexpress.com/ix/Q/384683?p=129&preview=true&livePreview=True&startingPosition=0&accessCode=2295695960

"
    ];

    // Wait 20 seconds, then redirect to a random survey
    setTimeout(function() {
      const randomIndex = Math.floor(Math.random() * surveys.length);
      window.location.href = surveys[randomIndex];
    }, 20000);
  </script>
</body>
</html>
