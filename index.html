<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finding An Ideal Survey</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .loader {
      border: 12px solid rgba(255,255,255,0.2);
      border-top: 12px solid #00c6ff;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 1.5s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h1>Finding An Ideal Survey For You</h1>
  <p>You will be redirected shortly...</p>

  <script>
    // Wait 20 seconds, then redirect
    setTimeout(function() {
      window.location.href = "https://screeningopenionbd.github.io/Sample-Surveys-estart-our-Survey01/";
    }, 20000);
  </script>
</body>
</html>
